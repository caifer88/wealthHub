services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wealthhub-backend
    restart: always
    environment:
      - FRONTEND_URL=http://localhost:3000,http://main:5173
      - VITE_GAS_URL=${VITE_GAS_URL:-}
    volumes:
      - ./backend:/app
    networks:
      - umbrel_main_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 3

  main:  # <--- Antes era 'frontend', ahora coincide con app.yml
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: wealthhub-frontend
    restart: always
    ports:
      - "8787:5173"  # Mapeo directo al puerto que quieres usar
    environment:
      - VITE_BACKEND_URL=http://backend:8000
      - VITE_GAS_URL=${VITE_GAS_URL:-}
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    networks:
      - umbrel_main_network
    depends_on:
      - backend

networks:
  umbrel_main_network:
    external: true