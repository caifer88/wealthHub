services:
  db:
    image: postgres:15-alpine
    container_name: wealthhub-db
    restart: always
    environment:
      POSTGRES_USER: wealthhub
      POSTGRES_PASSWORD: wealthhub_password
      POSTGRES_DB: wealthhub
    ports:
      - "5432:5432"
    volumes:
      - wealthhub_db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - umbrel_main_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealthhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wealthhub-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - FRONTEND_URL=http://localhost:3000,http://main:5173
      - DATABASE_URL=postgresql://wealthhub:wealthhub_password@db:5432/wealthhub
    volumes:
      - ./backend:/app
    networks:
      - umbrel_main_network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 3

  main:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: wealthhub-frontend
    restart: always
    ports:
      - "8787:5173"
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    networks:
      - umbrel_main_network
    depends_on:
      - backend

networks:
  umbrel_main_network:
    driver: bridge

volumes:
  wealthhub_db_data:
